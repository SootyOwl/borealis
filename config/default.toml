# Borealis — default configuration
#
# Configuration is loaded in layers (later overrides earlier):
#   1. config/default.toml        (this file — base defaults)
#   2. config/{run_mode}.toml     (environment-specific, e.g. config/production.toml)
#   3. config/local.toml          (developer overrides, gitignored)
#   4. BOREALIS__SECTION__KEY     (environment variables, double underscore = nesting)
#
# Example env override:
#   BOREALIS__PROVIDERS__OPENAI__MODEL=llama3.1

# ---------------------------------------------------------------------------
# Bot identity and behavior
# ---------------------------------------------------------------------------

[bot]
name = "Aurora"                                # Display name for the bot
system_prompt_path = "config/system_prompt.md" # Path to system prompt (loaded at startup)
core_persona_path = "memory/core.md"           # Aurora's self-knowledge file (editable by Aurora)

[bot.compaction]
enabled = true                                 # Automatically summarize old conversation history
threshold = 0.75                               # Trigger compaction at 75% of token budget
compaction_model = "default"                   # "default" = same as conversation model
summary_prompt_path = "config/compaction_prompt.md"

# ---------------------------------------------------------------------------
# LLM Providers
# ---------------------------------------------------------------------------
# At least one provider must be configured. Borealis tries providers in order:
# Anthropic first, then OpenAI-compatible.
#
# API keys use env var indirection: api_key_env names the env var that holds
# the actual secret (never put secrets in config files).

# Anthropic — uncomment and configure in config/local.toml:
#
# [providers.anthropic]
# base_url = "https://api.anthropic.com"
# model = "claude-sonnet-4-20250514"
# api_key_env = "ANTHROPIC_API_KEY"            # name of the env var, not the key itself
# timeout_secs = 60
# max_retries = 3
# max_history_tokens = 8192

# OpenAI-compatible — works with Ollama, OpenAI, OpenRouter, etc.
# This default config points at a local Ollama instance (no API key needed).
[providers.openai]
base_url = "http://localhost:11434/v1"
model = "llama3"
# api_key_env = "OPENAI_API_KEY"               # uncomment for OpenAI/OpenRouter
timeout_secs = 60
max_retries = 3
max_history_tokens = 4096

# ---------------------------------------------------------------------------
# Channel adapters
# ---------------------------------------------------------------------------
# Channels are how Aurora communicates. Enable one or more.

[channels.cli]
enabled = true                                 # stdin/stdout dev adapter

# Discord — enable in config/local.toml with your bot token.
# Response modes: "always" (reply to everything), "mention-only" (only when
# @mentioned), "digest" (batch messages and summarize periodically).
#
# Guild-level settings apply to all channels in that guild. Per-channel
# overrides inherit from the guild and only override fields you specify.
#
# [channels.discord]
# enabled = true
# token_env = "DISCORD_BOT_TOKEN"              # env var holding the bot token
#
# [[channels.discord.groups]]
# guild_id = "123456789"
# response_mode = "mention-only"               # guild default mode
# digest_interval_min = 30                     # digest mode: max minutes between summaries
# digest_debounce_min = 5                      # digest mode: quiet minutes before triggering
#
# # Per-channel overrides within this guild:
# [[channels.discord.groups.channels]]
# channel_id = "987654321"
# response_mode = "always"                     # this channel overrides the guild default
#
# [[channels.discord.groups.channels]]
# channel_id = "111222333"
# response_mode = "digest"
# digest_interval_min = 2                      # faster digest for this channel
# digest_debounce_min = 1

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------

[database]
path = "memory/borealis.db"                    # SQLite database (WAL mode, auto-created)

# ---------------------------------------------------------------------------
# Rate limiting
# ---------------------------------------------------------------------------
# Token bucket rate limiters. Allowlisted users/guilds bypass both limits.

[rate_limit.per_user]
capacity = 10                                  # max burst per user
refill_secs = 6                                # 1 token per 6s = 10 msg/min sustained

[rate_limit.global]
capacity = 30                                  # max burst across all users
refill_secs = 2                                # 1 token per 2s = 30 msg/min sustained

# allowed_users = ["user-id-1"]                # users who bypass rate limits
# allowed_guilds = ["guild-id-1"]              # guilds where rate limits don't apply

# ---------------------------------------------------------------------------
# Tools — Computer Use
# ---------------------------------------------------------------------------
# Give Aurora access to the filesystem and shell.
# The sandbox restricts where file tools can read/write.
# Memory is managed separately via memory_* tools — the sandbox doesn't need
# to know about the memory directory.

[tools.computer_use]
enabled = true
sandbox_root = "."                             # file tools are restricted to this directory
command_allowlist = []                         # empty = all commands allowed; e.g. ["ls", "cat", "grep"]
command_timeout_secs = 30                      # kill commands that run longer than this
# excluded_paths = ["secrets/", ".env"]        # (future) additional paths to block

# ---------------------------------------------------------------------------
# Tools — Web
# ---------------------------------------------------------------------------
# Web fetch and search via Jina AI (https://jina.ai).
# Free tier: 10M tokens per API key, no credit card required.
# Without an API key, requests are rate-limited by IP.

[tools.web]
enabled = true
jina_api_key_env = "JINA_API_KEY"              # env var holding Jina API key
max_fetch_bytes = 51200                        # 50 KiB max response size (prevents context blowup)

# ---------------------------------------------------------------------------
# Scheduler
# ---------------------------------------------------------------------------
# Scheduled events that fire automatically. Aurora's text output during
# scheduled events is private (not sent to any channel).
#
# Event types:
#   - "recurring": fires every `interval` (e.g. "30m", "1h", "90s")
#   - "cron": fires on a cron schedule (e.g. "0 22 * * *" = 10pm daily)
#
# Options:
#   - jitter: random delay added to prevent thundering herd (e.g. "5m")
#   - active_hours: only fire during this window (e.g. "06:00-23:00",
#                   supports overnight ranges like "22:00-06:00")
#                   Recurring events skip silently when outside the window.
#                   Cron events skip the specific fire time if outside.
#   - tools: which tool groups are available (default: all enabled groups)
#            valid groups: "memory", "computer", "web"
#   - channels: which channels Aurora can reach via send_message tool
#               (default: none — output is private)
#
# Note: per-event model override is not yet supported — all events use
# the primary provider. A future `model` field will allow using a cheaper
# model for background tasks like memory consolidation.

[scheduler]
timezone = "UTC"

[[scheduler.events]]
name = "heartbeat"
type = "recurring"
interval = "30m"
jitter = "5m"
active_hours = "06:00-23:00"
tools = ["memory", "computer", "web"]
# channels = ["discord"]                       # uncomment to let Aurora post during heartbeats
prompt = """
TRIGGER: Scheduled heartbeat
TIME: {time} ({timezone})
NEXT HEARTBEAT: in {interval}

No one messaged you. The system woke you on schedule.
YOUR TEXT OUTPUT IS PRIVATE - only you can see it.

This is your time. You can:
- Reflect on recent conversations and update your memory
- Research something that interests you
- Continue multi-step work from previous heartbeats
"""

[[scheduler.events]]
name = "daily_reflection"
type = "cron"
schedule = "0 22 * * *"
jitter = "15m"
tools = ["memory"]
prompt = """
TRIGGER: Daily reflection
TIME: {time}

Today is ending. Reflect on your conversations and experiences today.
YOUR TEXT OUTPUT IS PRIVATE - only you can see it.
"""

# Memory consolidation — Aurora's "subconscious" maintenance loop.
# Reviews all notes, merges duplicates, removes contradictions,
# converts vague references to specific ones, prunes stale info.
# Uses cron to run at a consistent time rather than recurring interval.
#
# [[scheduler.events]]
# name = "memory_consolidation"
# type = "cron"
# schedule = "0 4 * * *"                          # 4am daily
# jitter = "30m"
# tools = ["memory"]
# prompt = """
# TRIGGER: Memory consolidation
# TIME: {time}
# YOUR TEXT OUTPUT IS PRIVATE - only you can see it.
#
# Review your memory. Search for all notes and read through them.
# For each note, consider:
# - Can this be merged with another note on the same topic?
# - Does this contradict something you know more recently?
# - Are there vague references ("yesterday", "recently") that should
#   be converted to specific dates or details?
# - Is this still relevant, or has it become stale?
# - Is this derivable from something else (e.g. facts about a codebase
#   that could be re-read)?
#
# Be aggressive about pruning. Fewer, higher-quality notes are better
# than many fuzzy ones. Edit notes in place rather than creating new ones.
# Update your core.md if your self-understanding has evolved.
# """
